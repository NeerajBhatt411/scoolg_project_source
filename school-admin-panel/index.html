<!doctype html>
<html class="light" lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoolg Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=block"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=block"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
    rel="stylesheet" />
  <style>
    /* Bulletproof FOUC Prevention */
    html { visibility: hidden; opacity: 0; }
  </style>
  <script>
    // Reveal once all stylesheets and scripts are ready
    window.addEventListener('DOMContentLoaded', () => {
        // Wait an extra tick to ensure CSS OM is fully built
        requestAnimationFrame(() => {
            document.documentElement.style.visibility = 'visible';
            document.documentElement.style.opacity = '1';
        });
    });
    // Fallback if DOMContentLoaded already fired
    setTimeout(() => {
        document.documentElement.style.visibility = 'visible';
        document.documentElement.style.opacity = '1';
    }, 2000);
  </script>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .status-aura-success {
      background-color: rgba(34, 197, 94, 0.12);
    }

    .premium-shadow {
      box-shadow: 0 12px 32px -4px rgba(0, 74, 198, 0.04), 0 4px 12px -2px rgba(0, 0, 0, 0.02);
    }

    .primary-gradient {
      background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
    }
  </style>
  <style>
    /* Prevent FOUC: Hide everything until React is ready */
    #root:empty {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #f8fafc;
    }
    .scoolg-loader {
      width: 48px;
      height: 48px;
      border: 5px solid #e2e8f0;
      border-bottom-color: #004ac6;
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="scoolg-loader"></div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
