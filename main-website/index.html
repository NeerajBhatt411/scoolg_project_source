<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCoolG - Smart School Management</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Poppins:wght@500;600;700&amp;display=swap"
    rel="stylesheet" />
  <script>
    // Instant dark mode — runs before any paint, prevents flash
    (function () {
      var theme = localStorage.getItem('theme');
      if (theme === 'light') {
        document.documentElement.classList.remove('dark');
      }
      // else: keep 'dark' class that's already on <html>
    })();
  </script>
  <style>
    /* Prevent FOUC */
    #root:empty {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #ffffff;
    }
    .scoolg-loader {
      width: 48px;
      height: 48px;
      border: 5px solid #e2e8f0;
      border-bottom-color: #e31e24; /* Scoolg Red */
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .dark #root:empty {
      background-color: #09090b;
    }
    .dark .scoolg-loader {
      border-color: #27272a;
      border-bottom-color: #e31e24;
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="scoolg-loader"></div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
