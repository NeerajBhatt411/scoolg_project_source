<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/teacher-icon-192.png" />
  <link rel="apple-touch-icon" href="/teacher-icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ScoolG Teacher" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ScoolG | Teacher Portal</title>
  <meta name="description" content="Mark attendance, assign homework and manage your classes with ScoolG Teacher." />
  <meta name="theme-color" content="#2563eb" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=block" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Material Symbols bundled locally (material-symbols pkg) — no CDN, no icon-name text flash. -->
  
  <style>
    /* Bulletproof FOUC Prevention */
    html { visibility: hidden; opacity: 0; transition: opacity 0.1s ease-in; }
  </style>
  <script>
    // Reveal once all stylesheets and scripts are ready
    window.addEventListener('DOMContentLoaded', () => {
        requestAnimationFrame(() => {
            document.documentElement.style.visibility = 'visible';
            document.documentElement.style.opacity = '1';
        });
    });
    setTimeout(() => {
        document.documentElement.style.visibility = 'visible';
        document.documentElement.style.opacity = '1';
    }, 2000);
  </script>

  <style>
    /* Prevent FOUC: Hide everything until React is ready */
    #root:empty {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #f8fafc;
      /* light background matching the theme */
    }

    .scoolg-loader {
      width: 48px;
      height: 48px;
      border: 5px solid #e2e8f0;
      border-bottom-color: #2563eb;
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .dark #root:empty {
      background-color: #0f172a;
    }

    .dark .scoolg-loader {
      border-color: #334155;
      border-bottom-color: #3b82f6;
    }
  </style>
</head>

<body class="antialiased">
  <div id="root">
    <div class="scoolg-loader"></div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
