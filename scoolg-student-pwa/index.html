<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ScoolG | Student Portal</title>
  <meta name="description"
    content="Access your academic profile, manage your schedule, and stay connected with ScoolG." />
  <meta name="theme-color" content="#f8fafc" />
  <link rel="apple-touch-icon" href="/pwa-192x192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ScoolG Student" />
  
  <!-- Preload fonts to prevent FOUC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
  
  <script>
    // Extract school info to show correct initial state if possible
    try {
      const info = JSON.parse(localStorage.getItem('school_info'));
      if (info && info.name) {
        window.__INITIAL_SCHOOL_CHAR__ = info.name.charAt(0).toUpperCase();
      }
      if (info && info.logo) {
        window.__INITIAL_SCHOOL_LOGO__ = info.logo;
      }
    } catch(e) {}
  </script>
  <style>
    /* Prevent FOUC: Hide everything until React is ready */
    #root:empty {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #f8fafc;
    }
    .scoolg-loader {
      width: 48px;
      height: 48px;
      border: 5px solid #e2e8f0;
      border-bottom-color: #004ac6; /* Primary blue */
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="antialiased bg-[#f8fafc]">
  <div id="root">
    <div style="min-height: 100vh; width: 100%; background-color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center;">
      <div style="width: 4rem; height: 4rem; border-radius: 1rem; background-color: white; border: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.1), 0 8px 10px -6px rgba(37, 99, 235, 0.1); margin-bottom: 2rem; overflow: hidden;">
        <div id="initial-logo-container" style="width: 100%; height: 100%; background-color: #2563eb; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.875rem; font-weight: 900; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">S</div>
      </div>
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <div style="width: 0.625rem; height: 0.625rem; border-radius: 9999px; background-color: #2563eb; animation: bounce 1s infinite; animation-delay: 0ms;"></div>
        <div style="width: 0.625rem; height: 0.625rem; border-radius: 9999px; background-color: #2563eb; animation: bounce 1s infinite; animation-delay: 150ms;"></div>
        <div style="width: 0.625rem; height: 0.625rem; border-radius: 9999px; background-color: #2563eb; animation: bounce 1s infinite; animation-delay: 300ms;"></div>
      </div>
      <p style="margin-top: 1.25rem; font-size: 0.625rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.2em; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">Loading Workspace</p>
    </div>
  </div>
  
  <script>
    if (window.__INITIAL_SCHOOL_LOGO__) {
      document.getElementById('initial-logo-container').innerHTML = '<img src="' + window.__INITIAL_SCHOOL_LOGO__ + '" style="width: 100%; height: 100%; object-fit: contain; padding: 0.5rem;" />';
      document.getElementById('initial-logo-container').style.backgroundColor = 'white';
    } else if (window.__INITIAL_SCHOOL_CHAR__) {
      document.getElementById('initial-logo-container').innerText = window.__INITIAL_SCHOOL_CHAR__;
    }
  </script>
  
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    @keyframes bounce { 0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); } 50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); } }
  </style>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
