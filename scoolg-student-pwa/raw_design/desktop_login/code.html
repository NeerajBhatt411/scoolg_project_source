<body class="bg-background text-on-background font-body-md min-h-screen">
<main class="flex min-h-screen">
<!-- Left Side: Visual/Branding -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
<img alt="Academic Campus" class="absolute inset-0 w-full h-full object-cover" data-alt="A cinematic wide shot of a modern university library during golden hour, where soft sunlight streams through tall glass windows onto focused students. The architectural aesthetic is minimalist-professional with clean lines and premium blue-toned shadows that align with a high-fidelity educational brand. The mood is serene, intellectual, and aspirational, emphasizing a high-end academic lifestyle with a sophisticated color palette of crisp whites and deep corporate blues." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAuH-PFr0Pye4khXWoq3HltCu7dHkaYV2_-6i_SSO67DBOpKybUC1WlAAYo8Fe3nQ8cY6bTDekolLUILB0qzIO9WKeRB3amvomVnrzqG9rVkwniQa-IuwFih4libpiDPe5MmxnUjldAh_11ZWf0Vs1YCK-m0K5oiZFB6SOIjHdqtIxYOSZAmy1Zht3K6Y2_4PIdtX-K_Clp2FhCi3ipKi6-whrh7cnQSAKpLNXI0ye_BDbIiSjfKJY7KNRJDZBFzho-bJpf1cxY2U"/>
<div class="absolute inset-0 image-overlay"></div>
<div class="relative z-10 flex flex-col justify-between p-12 w-full text-white">
<div>
<h1 class="font-display-lg text-display-lg font-bold tracking-tight">SchoolG</h1>
<p class="font-title-lg text-title-lg opacity-90 mt-2">Premium Academy</p>
</div>
<div class="max-w-md">
<h2 class="font-headline-md text-headline-md mb-4 leading-tight">Elevating the standard of modern education management.</h2>
<div class="flex gap-4">
<div class="h-1 w-12 bg-white rounded-full"></div>
<div class="h-1 w-4 bg-white/40 rounded-full"></div>
<div class="h-1 w-4 bg-white/40 rounded-full"></div>
</div>
</div>
</div>
</section>
<!-- Right Side: Login Form -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-section-padding bg-surface">
<div class="w-full max-w-md space-y-8">
<!-- Header -->
<div class="space-y-2">
<div class="lg:hidden mb-8">
<span class="font-display-lg text-display-lg font-bold text-primary">SchoolG</span>
</div>
<h3 class="font-display-lg text-display-lg text-on-surface">Login to your account</h3>
<p class="font-body-lg text-body-lg text-on-surface-variant">Welcome back. Please enter your details.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- ID / Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="identifier">Student ID / Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined">person</span>
</div>
<input class="w-full h-[52px] pl-12 pr-4 bg-surface-container-low border-none rounded-xl font-body-md text-on-surface transition-all duration-200 focus:ring-2 focus:ring-primary focus:bg-white placeholder:text-outline/60" id="identifier" name="identifier" placeholder="Enter your ID or email" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full h-[52px] pl-12 pr-12 bg-surface-container-low border-none rounded-xl font-body-md text-on-surface transition-all duration-200 focus:ring-2 focus:ring-primary focus:bg-white placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3 px-1">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary transition-all" id="remember" name="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">Remember Me</label>
</div>
<!-- Login Button -->
<button class="w-full h-[52px] bg-primary-container text-white font-title-lg text-title-lg rounded-xl shadow-[0_4px_20px_rgba(37,99,235,0.2)] hover:shadow-[0_6px_24px_rgba(37,99,235,0.3)] transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                        Login
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Support Footer -->
<div class="pt-8 flex flex-col items-center space-y-4">
<p class="font-body-md text-body-md text-on-surface-variant">Having trouble signing in?</p>
<button class="flex items-center gap-2 px-6 py-2 rounded-full border border-outline-variant hover:bg-surface-container transition-colors font-label-md text-label-md text-secondary">
<span class="material-symbols-outlined text-[18px]">support_agent</span>
                        Contact Support
                    </button>
</div>
</div>
</section>
</main>
</body></html>
