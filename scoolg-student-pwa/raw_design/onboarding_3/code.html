<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#505f76",
                    "on-primary-fixed-variant": "#003ea8",
                    "inverse-on-surface": "#f0f0fb",
                    "tertiary-fixed-dim": "#ffb596",
                    "on-background": "#191b23",
                    "primary-fixed-dim": "#b4c5ff",
                    "surface-container-low": "#f3f3fe",
                    "on-surface-variant": "#434655",
                    "on-tertiary-container": "#ffede6",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e1e2ed",
                    "on-primary-fixed": "#00174b",
                    "on-error-container": "#93000a",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#faf8ff",
                    "on-secondary-container": "#54647a",
                    "on-primary-container": "#eeefff",
                    "surface": "#faf8ff",
                    "primary-container": "#2563eb",
                    "primary-fixed": "#dbe1ff",
                    "secondary-container": "#d0e1fb",
                    "on-primary": "#ffffff",
                    "on-surface": "#191b23",
                    "surface-container": "#ededf9",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#b7c8e1",
                    "inverse-primary": "#b4c5ff",
                    "outline-variant": "#c3c6d7",
                    "inverse-surface": "#2e3039",
                    "on-secondary-fixed": "#0b1c30",
                    "background": "#faf8ff",
                    "secondary-fixed": "#d3e4fe",
                    "surface-tint": "#0053db",
                    "surface-container-high": "#e7e7f3",
                    "on-secondary-fixed-variant": "#38485d",
                    "on-error": "#ffffff",
                    "outline": "#737686",
                    "primary": "#004ac6",
                    "on-tertiary-fixed": "#360f00",
                    "surface-dim": "#d9d9e5",
                    "surface-container-highest": "#e1e2ed",
                    "tertiary": "#943700",
                    "tertiary-container": "#bc4800",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "tertiary-fixed": "#ffdbcd"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "inline-gap": "12px",
                    "container-margin": "20px",
                    "card-internal-padding": "20px",
                    "stack-gap": "16px",
                    "section-padding": "24px"
            },
            "fontFamily": {
                    "headline-md": ["Manrope"],
                    "label-md": ["Inter"],
                    "display-lg": ["Manrope"],
                    "title-lg": ["Manrope"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "display-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bento-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .bento-card:active {
            transform: scale(0.98);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-lg min-h-screen flex flex-col">
<!-- Top Navigation Anchor (Shared Component suppressed for onboarding focus, but logic handled via Layout) -->
<header class="flex justify-between items-center px-container-margin w-full h-16 bg-surface">
<div class="text-title-lg font-title-lg font-bold text-primary">SchoolG</div>
<button class="text-label-md font-label-md text-on-surface-variant px-4 py-2 hover:bg-surface-container-low transition-colors rounded-xl">Skip</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center px-container-margin pt-8 pb-12 overflow-hidden">
<!-- Illustration Section: Bento Dashboard Overview -->
<div class="w-full max-w-md aspect-[4/3] relative mb-10">
<div class="absolute inset-0 bg-primary/5 rounded-[40px] blur-3xl -z-10"></div>
<div class="grid grid-cols-6 grid-rows-6 gap-3 h-full w-full">
<!-- Large Central Card: Results -->
<div class="col-span-4 row-span-4 bg-surface-container-lowest rounded-[32px] shadow-[0_4px_20px_rgba(37,99,235,0.08)] p-card-internal-padding flex flex-col justify-between border border-surface-variant">
<div class="flex justify-between items-start">
<div class="p-3 bg-secondary-container rounded-2xl">
<span class="material-symbols-outlined text-primary" data-icon="auto_graph">auto_graph</span>
</div>
<div class="px-3 py-1 bg-tertiary-fixed rounded-full text-[10px] font-bold text-on-tertiary-fixed uppercase tracking-wider">Semester 1</div>
</div>
<div>
<div class="text-label-md font-label-md text-on-surface-variant mb-1">Current GPA</div>
<div class="text-display-lg font-display-lg text-primary">3.92</div>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[92%] rounded-full"></div>
</div>
</div>
<!-- Right Card: Timetable -->
<div class="col-span-2 row-span-3 bg-surface-container-lowest rounded-[28px] shadow-[0_4px_20px_rgba(0,0,0,0.06)] p-4 flex flex-col items-center justify-center border border-surface-variant">
<span class="material-symbols-outlined text-primary mb-2" data-icon="calendar_today">calendar_today</span>
<div class="text-[10px] font-bold text-on-surface-variant uppercase text-center leading-tight">Next Class<br><span class="text-primary normal-case">10:30 AM</span></div>
</div>
<!-- Bottom Left: Attendance -->
<div class="col-span-3 row-span-2 bg-surface-container-lowest rounded-[28px] shadow-[0_4px_20px_rgba(0,0,0,0.06)] p-4 flex items-center gap-3 border border-surface-variant">
<div class="w-10 h-10 rounded-full border-4 border-primary/20 border-t-primary flex items-center justify-center">
<span class="text-[10px] font-bold">95%</span>
</div>
<div class="text-label-md font-label-md text-on-surface">Attendance</div>
</div>
<!-- Bottom Right: Small Indicator -->
<div class="col-span-3 row-span-3 bg-primary-container rounded-[28px] p-4 flex flex-col justify-between text-on-primary-container shadow-[0_8px_24px_rgba(37,99,235,0.2)]">
<span class="material-symbols-outlined text-white" data-icon="verified">verified</span>
<div class="text-label-md font-bold leading-tight">Tasks Done</div>
</div>
<!-- Tiny Accent -->
<div class="col-span-2 row-span-1 bg-tertiary rounded-full"></div>
</div>
</div>
<!-- Text Content -->
<div class="text-center max-w-sm mb-12">
<h1 class="text-display-lg font-display-lg text-on-background mb-4">Everything Organized</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Access timetable, attendance, results and more with ease.</p>
</div>
<!-- Footer Actions -->
<div class="w-full max-w-md mt-auto space-y-8">
<!-- Pagination Indicators -->
<div class="flex justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-8 h-2 rounded-full bg-primary transition-all duration-500"></div>
</div>
<!-- CTA Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary font-bold text-title-lg rounded-xl shadow-[0_12px_24px_rgba(37,99,235,0.25)] flex items-center justify-center gap-2 active:scale-95 transition-transform duration-200">
                Get Started
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Visual Polish: Background Gradients -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-20 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[40%] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>


</body></html>
