<body class="font-body-md text-on-surface antialiased">
<div class="min-h-screen flex flex-col items-center justify-center px-container-margin py-section-padding bg-surface">
<!-- Logo & Branding Section -->
<header class="mb-10 text-center flex flex-col items-center">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-lg shadow-primary-container/20 mb-6">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="school">school</span>
</div>
<h1 class="text-display-lg font-display-lg text-on-surface mb-2 tracking-tight">SchoolG</h1>
<p class="text-body-md text-on-surface-variant max-w-xs">Access your academic journey with precision and ease.</p>
</header>
<!-- Login Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-[24px] p-8 shadow-[0_4px_20px_rgba(37,99,235,0.06)] border border-surface-variant/30">
<form action="#" class="flex flex-col gap-stack-gap" method="POST">
<!-- Student ID Input -->
<div class="flex flex-col gap-2">
<label class="text-label-md font-label-md text-on-surface-variant ml-1" for="student-id">Student ID</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="badge">badge</span>
</div>
<input class="w-full h-[52px] bg-surface-container-low border-none rounded-xl pl-12 pr-4 text-body-lg focus:ring-2 focus:ring-primary focus:bg-surface transition-all placeholder:text-outline/60 outline-none" id="student-id" name="student-id" placeholder="Enter your ID" type="text">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-label-md font-label-md text-on-surface-variant" for="password">Password</label>
<a class="text-label-md font-label-md text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full h-[52px] bg-surface-container-low border-none rounded-xl pl-12 pr-12 text-body-lg focus:ring-2 focus:ring-primary focus:bg-surface transition-all placeholder:text-outline/60 outline-none" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 mt-1">
<input class="w-5 h-5 rounded border-outline text-primary-container focus:ring-primary-container cursor-pointer" id="remember-me" type="checkbox">
<label class="text-body-md text-on-surface-variant cursor-pointer select-none" for="remember-me">Remember Me</label>
</div>
<!-- Login Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary font-headline-md text-headline-md rounded-xl shadow-md shadow-primary-container/30 hover:bg-primary transition-all active:scale-95 mt-4" type="submit">
                    Login
                </button>
</form>
<!-- Bottom Divider & Action -->
<div class="mt-10 pt-8 border-t border-surface-variant/50 flex flex-col items-center gap-4">
<p class="text-body-md text-on-surface-variant">New student at this institution?</p>
<button class="w-full h-[48px] border-2 border-primary-container/20 text-primary font-title-lg text-title-lg rounded-xl hover:bg-primary-fixed transition-colors">
                    Request Credentials
                </button>
</div>
</main>
<!-- Decorative Element (Asymmetric/Modern) -->
<div class="hidden lg:block fixed -bottom-20 -left-20 w-80 h-80 bg-primary/5 rounded-full blur-3xl"></div>
<div class="hidden lg:block fixed -top-20 -right-20 w-80 h-80 bg-tertiary-container/5 rounded-full blur-3xl"></div>

</div>
