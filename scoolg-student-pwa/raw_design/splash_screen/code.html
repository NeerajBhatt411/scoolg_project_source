<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>SchoolG - Premium School Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#505f76",
                    "on-primary-fixed-variant": "#003ea8",
                    "inverse-on-surface": "#f0f0fb",
                    "tertiary-fixed-dim": "#ffb596",
                    "on-background": "#191b23",
                    "primary-fixed-dim": "#b4c5ff",
                    "surface-container-low": "#f3f3fe",
                    "on-surface-variant": "#434655",
                    "on-tertiary-container": "#ffede6",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e1e2ed",
                    "on-primary-fixed": "#00174b",
                    "on-error-container": "#93000a",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#faf8ff",
                    "on-secondary-container": "#54647a",
                    "on-primary-container": "#eeefff",
                    "surface": "#faf8ff",
                    "primary-container": "#2563eb",
                    "primary-fixed": "#dbe1ff",
                    "secondary-container": "#d0e1fb",
                    "on-primary": "#ffffff",
                    "on-surface": "#191b23",
                    "surface-container": "#ededf9",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#b7c8e1",
                    "inverse-primary": "#b4c5ff",
                    "outline-variant": "#c3c6d7",
                    "inverse-surface": "#2e3039",
                    "on-secondary-fixed": "#0b1c30",
                    "background": "#faf8ff",
                    "secondary-fixed": "#d3e4fe",
                    "surface-tint": "#0053db",
                    "surface-container-high": "#e7e7f3",
                    "on-secondary-fixed-variant": "#38485d",
                    "on-error": "#ffffff",
                    "outline": "#737686",
                    "primary": "#004ac6",
                    "on-tertiary-fixed": "#360f00",
                    "surface-dim": "#d9d9e5",
                    "surface-container-highest": "#e1e2ed",
                    "tertiary": "#943700",
                    "tertiary-container": "#bc4800",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "tertiary-fixed": "#ffdbcd"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "inline-gap": "12px",
                    "container-margin": "20px",
                    "card-internal-padding": "20px",
                    "stack-gap": "16px",
                    "section-padding": "24px"
            },
            "fontFamily": {
                    "headline-md": ["Manrope"],
                    "label-md": ["Inter"],
                    "display-lg": ["Manrope"],
                    "title-lg": ["Manrope"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "display-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .splash-glow {
            background: radial-gradient(circle, rgba(37, 99, 235, 0.12) 0%, rgba(250, 248, 255, 0) 70%);
        }
        .loading-bar-container {
            width: 140px;
            height: 4px;
            background-color: #f1f5f9;
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }
        .loading-bar-fill {
            width: 40%;
            height: 100%;
            background-color: #2563eb;
            border-radius: 999px;
            position: absolute;
            left: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden h-screen w-full flex flex-col items-center justify-between py-12">
<!-- Top Spacer to help with centering -->
<div class="h-16"></div>
<!-- Central Logo and Identity Section -->
<main class="flex flex-col items-center relative">
<!-- Glow Effect Behind Logo -->
<div class="absolute inset-0 -top-24 -bottom-24 -left-24 -right-24 splash-glow pointer-events-none z-0"></div>
<div class="relative z-10 flex flex-col items-center">
<!-- Abstract Icon Container -->
<div class="w-32 h-32 bg-surface-container-lowest shadow-2xl shadow-primary/10 rounded-[32px] flex items-center justify-center mb-8 border border-white/40">
<div class="flex flex-col items-center justify-center text-primary-container">
<span class="material-symbols-outlined !text-[64px]" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
</div>
<!-- Brand Name -->
<div class="flex flex-col items-center gap-1">
<h1 class="font-display-lg text-display-lg text-on-background tracking-tighter">SchoolG</h1>
<p class="font-label-md text-label-md text-outline uppercase tracking-widest opacity-80">Precision Management</p>
</div>
</div>
</main>
<!-- Bottom Loading Section -->
<footer class="flex flex-col items-center gap-6">
<!-- Minimal Loading Indicator -->
<div class="loading-bar-container">
<div class="loading-bar-fill"></div>
</div>
<!-- Subtle Status Text -->
<span class="font-label-md text-label-md text-outline-variant animate-pulse">Initializing school systems...</span>
<!-- Tertiary Accreditation/Brand Tagline -->
<div class="mt-12 opacity-40">
<p class="font-label-md text-[10px] tracking-tight">POWERED BY EDUSYSTEMS GLOBAL</p>
</div>
</footer>
<!-- Background Decorative Elements (Bento/Glassmorphism influence) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden -z-10">
<div class="absolute -top-20 -left-20 w-80 h-80 bg-primary-fixed/20 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-20 -right-20 w-80 h-80 bg-secondary-fixed/20 rounded-full blur-[100px]"></div>
<!-- Floating Glass Orbs for Premium Feel -->
<div class="absolute top-[15%] right-[10%] w-4 h-4 rounded-full bg-primary/10 border border-primary/5"></div>
<div class="absolute bottom-[20%] left-[15%] w-6 h-6 rounded-full bg-secondary/10 border border-secondary/5"></div>
</div>


</body></html>
